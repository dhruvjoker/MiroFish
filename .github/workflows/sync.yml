name: Sync to Hugging Face Hub
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # This is the EXACT line from your editor's note to fix the Node 24 issue
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        # v4 is the latest version compatible with Node 24
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          # Use the 'Write' token you created in Hugging Face
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # The 2026 secure URL format
          git remote add hf https://Dhruvcant:$HF_TOKEN@huggingface.co/spaces/Dhruvcant/microfish-simulator || git remote set-url hf https://Dhruvcant:$HF_TOKEN@huggingface.co/spaces/Dhruvcant/microfish-simulator
          git push --force hf HEAD:main
