name: Sync to Hugging Face Hub
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rm -rf .git
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Initialize LFS
          git lfs install
          
          # Track EVERYTHING that Hugging Face is rejecting
          git lfs track "*.db"
          git lfs track "*.sqlite"
          git lfs track "*.png"
          git lfs track "*.jpeg"
          git lfs track "*.jpg"
          git lfs track "*.gif"
          
          # Crucial: Ensure the .gitattributes file (which stores the LFS rules) is added first
          git add .gitattributes
          git add .
          
          git commit -m "Clean sync: Moving images and DBs to LFS"
          
          # Force push to the Space
          git push --force https://Dhruvcant:$HF_TOKEN@huggingface.co/spaces/Dhruvcant/microfish-simulator master:main
