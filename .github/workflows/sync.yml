name: Sync to Hugging Face Hub
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# This block is MANDATORY in 2026 to fix Exit Code 1
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # This new URL format bypasses the 2026 Node/Auth issues
        run: git push --force https://Dhruvcant:$HF_TOKEN@huggingface.co/spaces/Dhruvcant/microfish-simulator HEAD:main
